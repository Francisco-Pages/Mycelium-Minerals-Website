<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800">
  <defs>
    <filter id="topo" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="turbulence" baseFrequency="0.013" numOctaves="4" seed="5" stitchTiles="stitch" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="60" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <pattern id="lines" x="0" y="0" width="800" height="22" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0.5" x2="800" y2="0.5" stroke="#0a0a0a" stroke-width="7.5"/>
    </pattern>
  </defs>
  <rect width="800" height="800" fill="url(#lines)" filter="url(#topo)" opacity="0.03"/>
</svg>
